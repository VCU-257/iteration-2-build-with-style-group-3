<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Home</title>
        <link rel="stylesheet" type="text/css" href="scss/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </head>
    <body>
        <div>
            <header>
                <div class="container-fluid bg-primary text-white p-3">
                    <h1 class="mb-0">Logo</h1>
                </div>
                <!-- search bar -->
                <div class="position-fixed top-0 end-0 p-3" style="z-index:1030;">
                    <form class="d-flex bg-light p-2 rounded shadow-sm align-items-center" role="search" action="#" method="get">
                        <input class="form-control form-control-sm me-2" type="search" placeholder="Search" aria-label="Search" name="q">
                        <button class="btn btn-sm" type="submit">icon</button>
                    </form>
                </div>
            </header>

        <!-- navbar from script -->
        <div id="navbar-container"></div>

        <!-- carousel 
         NOTE: will need CSS to make sure banner stays at one height while matching viewport width -->
        <div class="container-fluid my-4 px-0">
            <div id="carouselExample" class="carousel slide" data-bs-slide="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active" style="height: 400px;">
                <img src="images/carousel1.png" class="d-block w-100 object-fit-cover" alt="...">
                </div>
                <div class="carousel-item" style="height: 400px;">
                <img src="images/carousel2.png" class="d-block w-100 object-fit-cover" alt="...">
                </div>
                <div class="carousel-item" style="height: 400px;">
                <img src="images/carousel3.png" class="d-block w-100 object-fit-cover" alt="...">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
</div>
        </div>

        <div class="container-fluid bg-primary text-white min-vh-100 pt-5">
            <div class="container py-3">
                <!-- Content -->
                <p class="lead">Welcome to the home page! This is where you can find the latest updates and information about your representatives.</p>
                <p>Feel free to explore the site and learn more about what we have to offer.</p>
            </div>
        </div>
    <script src="navbar.js"></script>
    </body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</html>
